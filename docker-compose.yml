version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./docker:/docker-entrypoint-initdb.d/
    networks:
      - cti_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      xpack.security.enabled: "true"
    ports:
      - "9200:9200"
    volumes:
      - ./data/es_data:/usr/share/elasticsearch/data
      - ./docker/init_kibana.sh:/usr/share/elasticsearch/init-elasticsearch.sh
    networks:
      - cti_network
    entrypoint: ["/usr/share/elasticsearch/init-elasticsearch.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail -u elastic:${ELASTICSEARCH_PASSWORD} localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.1
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      ELASTICSEARCH_API_KEY_FILE: "/usr/share/kibana/elastic_api_key.env"
    ports:
      - "5601:5601"
    networks:
      - cti_network
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  es_data:
    driver: local

networks:
  cti_network:
