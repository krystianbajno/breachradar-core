version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: cti_user
      POSTGRES_PASSWORD: cti_password
      POSTGRES_DB: cti_breach_hunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cti_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.0
    environment:
      discovery.type: single-node
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cti_network

volumes:
  postgres_data:
  es_data:

networks:
  cti_network:
